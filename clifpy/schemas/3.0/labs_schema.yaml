  - lab_value
  - reference_unit

category_columns:
  - lab_order_category
  - lab_category
  - lab_specimen_category

group_columns: []

# Each lab category mapped to its canonical (lowercase) reference unit key.
# Rebuilt from /tmp/mCIDE/labs/clif_lab_categories.csv 'reference_unit' column
# (first reference_unit listed per lab_category). Look up the canonical key in
# allowed_unit_variants below to find all accepted spellings.
lab_reference_units:
  ada: u/l
  albumin: g/dl
  albumin_to_creatinine_ratio: mg/g
  alkaline_phosphatase: u/l
  alt: u/l
  amphetamine: (no units)
  amylase: u/l
  ast: u/l
  barbiturate: (no units)
  basophils_absolute: 10^3/ul
  basophils_percent: "%"
  benzodiazepine: (no units)
  bicarbonate: mmol/l
  bilirubin: mg/dl
  bilirubin_conjugated: mg/dl
  bilirubin_total: mg/dl
  bilirubin_unconjugated: mg/dl
  bnp: pg/ml
  bun: mg/dl
  calcium_ionized: mg/dl
  calcium_total: mg/dl
  chloride: mmol/l
  cholesterol: mg/dl
  ckmb: ng/ml
  co2: mmol/l
  cocaine: (no units)
  creatinine: mg/dl
  crp: mg/l
  cystatin_c: mg/l
  d_dimer: ug/ml
  eosinophils_absolute: 10^3/ul
  eosinophils_percent: "%"
  esr: mm/hour
  ethanol: (no units)
  fentanyl: (no units)
  ferritin: ng/ml
  fibrinogen: mg/dl
  free_t3: pg/ml
  free_t4: ng/dl
  glucose: mg/dl
  glucose_serum: mg/dl
  hematocrit: "%"
  hematocrit_percent: "%"
  hemoglobin: g/dl
  igfbp7: ng/ml
  inr: (no units)
  interleukin_01: pg/ml
  interleukin_02: pg/ml
  interleukin_02_receptor_soluble: u/ml
  interleukin_05: pg/ml
  interleukin_06: pg/ml
  interleukin_08: pg/ml
  interleukin_10: pg/ml
  interleukin_13: pg/ml
  interleukin_18: pg/ml
  kim_1: ng/ml
  lactate: mmol/l
  ldh: u/l
  lipase: u/l
  lymphocytes_absolute: 10^3/ul
  lymphocytes_percent: "%"
  macrophages_percent: "%"
  magnesium: mg/dl
  mesothelial: "%"
  methadone: (no units)
  monocytes_absolute: 10^3/ul
  monocytes_percent: "%"
  nag: u/l
  neutrophils_absolute: 10^3/ul
  neutrophils_percent: "%"
  ngal: ng/ml
  nt_pro_bnp: pg/ml
  opiate: (no units)
  other_absolute: cells/ul
  oxycodone: (no units)
  pco2_arterial: mmhg
  pco2_venous: mmhg
  pcp: (no units)
  ph_arterial: (no units)
  ph_venous: (no units)
  phosphate: mg/dl
  plasma_absolute: cells/ul
  platelet_count: 10^3/ul
  po2_arterial: mmhg
  po2_mixed_venous: mmhg
  potassium: mmol/l
  probnp: pg/ml
  procalcitonin: ng/ml
  protein: g/dl
  protein_to_creatinine_ratio: mg/g
  pt: sec
  ptt: sec
  rbc: cells/ul
  rbc_absolute: cells/ul
  so2_arterial: "%"
  so2_central_venous: "%"
  so2_mixed_venous: "%"
  sodium: mmol/l
  timp_2: ng/ml
  timp_2_igfbp7: (ng/ml)^2/1000
  total_protein: g/dl
  toxic_granulation: (no units)
  triglycerides: mg/dl
  troponin_i: ng/l
  troponin_t: ng/l
  tsh: miu/l
  wbc: 10^3/ul
  wbc_absolute: cells/ul

# Per-category outlier bounds used for filtering implausible values before
# downstream analysis. Labs-side parallel of vital_ranges in vitals_schema.yaml.
# Carried over from the 2.1 template for lab_category values that still exist
# in 3.0.
lab_outlier_ranges:
  basophils_percent: {min: 0, max: 100}
  eosinophils_percent: {min: 0, max: 100}
  lymphocytes_absolute: {min: 0, max: 50}
  lymphocytes_percent: {min: 0, max: 100}
  monocytes_percent: {min: 0, max: 100}
  neutrophils_percent: {min: 0, max: 100}
  pt: {min: 1, max: 200}

# Per-category clinical reference (normal) ranges. Carried over from the 2.1
# template for lab_category values that still exist in 3.0.
lab_reference_ranges:
  basophils_percent: {lower: 0, upper: 2}
  eosinophils_percent: {lower: 0, upper: 4}
  lymphocytes_absolute: {lower: 1, upper: 4}
  lymphocytes_percent: {lower: 20, upper: 40}
  monocytes_percent: {lower: 2, upper: 8}
  neutrophils_percent: {lower: 50, upper: 70}
  pt: {lower: 10, upper: 13}

