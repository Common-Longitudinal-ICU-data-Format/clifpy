table_name: labs
version: "2.1"

columns:
  - name: hospitalization_id
    data_type: VARCHAR
    required: true
    is_category_column: false
    is_group_column: false
  - name: lab_order_dttm
    data_type: DATETIME
    required: true
    is_category_column: false
    is_group_column: false
  - name: lab_collect_dttm
    data_type: DATETIME
    required: true
    is_category_column: false
    is_group_column: false
  - name: lab_result_dttm
    data_type: DATETIME
    required: true
    is_category_column: false
    is_group_column: false
  - name: lab_order_name
    data_type: VARCHAR
    required: false
    is_category_column: false
    is_group_column: false
  - name: lab_order_category
    data_type: VARCHAR
    required: true
    is_category_column: true
    is_group_column: false
    permissible_values:
      - blood_gas
      - bmp
      - cbc
      - coags
      - lft
      - misc
  - name: lab_name
    data_type: VARCHAR
    required: false
    is_category_column: false
    is_group_column: false
  - name: lab_category
    data_type: VARCHAR
    required: true
    is_category_column: true
    is_group_column: false
    permissible_values:
      - albumin
      - alkaline_phosphatase
      - alt
      - ast
      - basophils_percent
      - basophils_absolute
      - bicarbonate
      - bilirubin_total
      - bilirubin_conjugated
      - bilirubin_unconjugated
      - bun
      - calcium_total
      - calcium_ionized
      - chloride
      - creatinine
      - crp
      - eosinophils_percent
      - eosinophils_absolute
      - esr
      - ferritin
      - glucose_fingerstick
      - glucose_serum
      - hemoglobin
      - phosphate
      - inr
      - lactate
      - ldh
      - lymphocytes_percent
      - lymphocytes_absolute
      - magnesium
      - monocytes_percent
      - monocytes_absolute
      - neutrophils_percent
      - neutrophils_absolute
      - pco2_arterial
      - po2_arterial
      - pco2_venous
      - ph_arterial
      - ph_venous
      - platelet_count
      - potassium
      - procalcitonin
      - pt
      - ptt
      - so2_arterial
      - so2_mixed_venous
      - so2_central_venous
      - sodium
      - total_protein
      - troponin_i
      - troponin_t
      - wbc
  - name: lab_value
    data_type: VARCHAR
    required: true
    is_category_column: false
    is_group_column: false
  - name: lab_value_numeric
    data_type: DOUBLE
    required: false
    is_category_column: false
    is_group_column: false
  - name: reference_unit
    data_type: VARCHAR
    required: true
    is_category_column: false
    is_group_column: false
  - name: lab_specimen_name
    data_type: VARCHAR
    required: false
    is_category_column: false
    is_group_column: false
  - name: lab_specimen_category
    data_type: VARCHAR
    required: false
    is_category_column: true
    is_group_column: false
    permissible_values:
      - blood/plasma/serum
      - urine
      - csf
      - other
  - name: lab_loinc_code
    data_type: VARCHAR
    required: false
    is_category_column: false
    is_group_column: false

required_columns:
  - hospitalization_id
  - lab_order_dttm
  - lab_collect_dttm
  - lab_result_dttm
  - lab_category
  - lab_order_category
  - lab_value
  - reference_unit

category_columns:
  - lab_order_category
  - lab_category


group_columns: []

# Each lab category mapped to its canonical (lowercase) reference unit key.
# Look up the canonical key in allowed_unit_variants below to find all accepted spellings.
lab_reference_units:
  albumin: g/dl
  alkaline_phosphatase: u/l
  alt: u/l
  ast: u/l
  basophils_percent: "%"
  basophils_absolute: 10^3/ul
  bicarbonate: mmol/l
  bilirubin_total: mg/dl
  bilirubin_conjugated: mg/dl
  bilirubin_unconjugated: mg/dl
  bun: mg/dl
  calcium_total: mg/dl
  calcium_ionized: mg/dl
  chloride: mmol/l
  creatinine: mg/dl
  crp: mg/l
  eosinophils_percent: "%"
  eosinophils_absolute: 10^3/ul
  esr: mm/hour
  ferritin: ng/ml
  glucose_fingerstick: mg/dl
  glucose_serum: mg/dl
  hemoglobin: g/dl
  phosphate: mg/dl
  inr: (no units)
  lactate: mmol/l
  ldh: u/l
  lymphocytes_percent: "%"
  lymphocytes_absolute: 10^3/ul
  magnesium: mg/dl
  monocytes_percent: "%"
  monocytes_absolute: 10^3/ul
  neutrophils_percent: "%"
  neutrophils_absolute: 10^3/ul
  pco2_arterial: mmhg
  po2_arterial: mmhg
  pco2_venous: mmhg
  ph_arterial: (no units)
  ph_venous: (no units)
  platelet_count: 10^3/ul
  potassium: mmol/l
  procalcitonin: ng/ml
  pt: sec
  ptt: sec
  so2_arterial: "%"
  so2_mixed_venous: "%"
  so2_central_venous: "%"
  sodium: mmol/l
  total_protein: g/dl
  troponin_i: ng/l
  troponin_t: ng/l
  wbc: 10^3/ul

# Per-category outlier bounds used for filtering implausible values before
# downstream analysis. Labs-side parallel of vital_ranges in vitals_schema.yaml.
# Values sourced from CLIF/outlier-handling/outlier_thresholds_labs.csv.
lab_outlier_ranges:
  basophils_percent: {min: 0, max: 100}
  eosinophils_percent: {min: 0, max: 100}
  lymphocytes_absolute: {min: 0, max: 50}
  lymphocytes_percent: {min: 0, max: 100}
  monocytes_percent: {min: 0, max: 100}
  neutrophils_percent: {min: 0, max: 100}
  pt: {min: 1, max: 200}

# Per-category clinical reference (normal) ranges. New companion block so
# downstream consumers can read both outlier and reference ranges from a
# single source of truth. Values sourced from
# CLIF/reference_ranges/lab_category.csv.
lab_reference_ranges:
  basophils_percent: {lower: 0, upper: 2}
  eosinophils_percent: {lower: 0, upper: 4}
  lymphocytes_absolute: {lower: 1, upper: 4}
  lymphocytes_percent: {lower: 20, upper: 40}
  monocytes_percent: {lower: 2, upper: 8}
  neutrophils_percent: {lower: 50, upper: 70}
  pt: {lower: 10, upper: 13}

